<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Televendas - Julho/2026</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#111;color:#eee;padding:0}
header{background:#1a1a2e;border-bottom:2px solid #f59e0b;padding:16px 24px;display:flex;align-items:center;flex-wrap:wrap;gap:10px}
header h1{font-size:32px;font-weight:700;color:#f59e0b}
header .ref{font-size:18px;color:#888;margin-left:auto}
header .ref span{color:#6b7280;font-size:15px}
.tabs{display:flex;gap:0;background:#0d0d1a;border-bottom:1px solid #333;padding:0 24px}
.tab{padding:14px 28px;font-size:18px;font-weight:600;color:#888;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;background:none;font-family:inherit}
.tab:hover{color:#eee}
.tab.active{color:#f59e0b;border-bottom-color:#f59e0b;background:rgba(245,158,11,0.05)}
.container{max-width:1400px;margin:0 auto;padding:24px 28px}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px;margin-bottom:24px}
.card{background:#1a1a2e;border:1px solid #333;border-radius:8px;padding:20px 24px}
.card .lbl{font-size:15px;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.card .val{font-size:34px;font-weight:800}
.chart-box{background:#1a1a2e;border:1px solid #333;border-radius:8px;padding:24px;margin-bottom:24px}
.chart-box h2{font-size:20px;font-weight:700;margin-bottom:14px;color:#fcd34d;text-transform:uppercase;letter-spacing:.5px}
.chart-box h2 .sub{font-size:16px;color:#aaa;font-weight:400;text-transform:none;letter-spacing:0}
table{width:100%;border-collapse:collapse;font-size:18px}
th{padding:10px 12px;text-align:left;font-weight:600;color:#999;font-size:15px;text-transform:uppercase;letter-spacing:.5px;background:#111;border-bottom:1px solid #333}
td{padding:9px 12px;text-align:left;border-bottom:1px solid #1a1a2e;color:#ccc}
tr:nth-child(even){background:rgba(255,255,255,0.02)}
tr:hover{background:rgba(255,255,255,0.05)}
.text-right{text-align:right}
.tw{max-height:420px;overflow-y:auto;overflow-x:auto;border:1px solid #333;border-radius:6px}
.tw th{position:sticky;top:0;z-index:2;background:#111}
.bar-bg{height:8px;border-radius:4px;background:#333;overflow:hidden;margin-top:4px;width:140px}
.bar-fill{height:100%;border-radius:4px}
.cell-cli{max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:600;color:#fcd34d}
footer{text-align:center;padding:16px;font-size:15px;color:#555;border-top:1px solid #1a1a2e;margin-top:10px}
@media(max-width:600px){.cards{grid-template-columns:1fr}.container{padding:12px}}
</style>
</head>
<body>

<header>
<h1>&#9742; Televendas &middot; Julho/2026</h1>
<div class="ref">Base 8026 &bull; 6 vendedores</div>
</header>

<div class="tabs">
<button class="tab active" onclick="switchView('geral')">Painel Televendas Julho</button>
<button class="tab" onclick="switchView('polpanorte')">Polpanorte Julho</button>
<button class="tab" onclick="switchView('regiaomes')">An&#225;lise Por Regi&#227;o</button>
</div>

<div class="container" id="app">
<div style="text-align:center;padding:60px 20px;color:#666">Carregando...</div>
</div>

<footer>Dashboard Televendas &bull; Base 8026_2026</footer>

<script>
var DADOS = [];
var activeView = 'geral';

function serialToDate(s){
  if(!s||s<60)return'';
  return new Date((s-1)*86400000-2209161600000).toLocaleDateString('pt-BR');
}

function fmt(v){
  if(v==null||isNaN(v))return'-';
  return'R$ '+v.toLocaleString('pt-BR',{minimumFractionDigits:0,maximumFractionDigits:0});
}

function pct(v,t){
  if(!t||!t)return 0;
  return v/t*100;
}

var METAS = {
  '1596':{nome:'Ariane',regiao:'POA',fat:145000,pos:95},
  '1464':{nome:'Camila',regiao:'SUL',fat:127328,pos:116},
  '1211':{nome:'Cristielen',regiao:'VALE DOS SINOS',fat:117386,pos:116},
  '1429':{nome:'Natália',regiao:'KEY ACCOUNT',fat:350000,pos:10},
  '9886':{nome:'Tatiana',regiao:'SERRA',fat:145000,pos:100},
  '1624':{nome:'Tatiana',regiao:'LITORAL',fat:95000,pos:90}
};

var METAS_POLPA = {
  '1596':{nome:'Ariane',regiao:'POA',fat:36500,pos:62},
  '1464':{nome:'Camila',regiao:'SUL',fat:40000,pos:98},
  '1211':{nome:'Cristielen',regiao:'VALE DOS SINOS',fat:75000,pos:103},
  '1429':{nome:'Natália',regiao:'KEY ACCOUNT',fat:175000,pos:0},
  '9886':{nome:'Tatiana',regiao:'SERRA',fat:87500,pos:143},
  '1624':{nome:'Tatiana',regiao:'LITORAL',fat:0,pos:0}
};

var DADOS_2025 = {
  fat: [1328301.64, 918484.44, 823230.42, 689873.21, 711582.82, 632591.74, 831557.85],
  pos: [481, 456, 394, 372, 320, 327, 391]
};
var META_2026 = {fat: 6642590.92, pos: 3118};

function switchView(view){
  activeView = view;
  var tabs = document.querySelectorAll('.tab');
  for(var ti=0;ti<tabs.length;ti++){
    tabs[ti].className = 'tab' + ((tabs[ti].getAttribute('onclick').indexOf("'"+view+"'") >= 0) ? ' active' : '');
  }
  if (activeView === 'regiaomes') renderRegiaoMes();
  else render();
}

function render(){
  if(!DADOS||!DADOS.length){
    document.getElementById('app').innerHTML='<div style="padding:40px;text-align:center;color:#666">Sem dados.</div>';
    return;
  }

  var filterCod = activeView === 'polpanorte' ? '10828' : null;
  var filtered = filterCod ? DADOS.filter(function(r){return String(r.codfornec)===filterCod;}) : DADOS;
  var metas = filterCod ? METAS_POLPA : METAS;
  var viewName = activeView === 'polpanorte' ? 'Polpanorte' : 'Geral';

  var pos=filtered.filter(function(r){return r.fat>=1;});

  var fatBru=filtered.reduce(function(s,r){return s+r.fat;},0);
  var totPos=pos.length;

  var cliPos={};
  pos.forEach(function(r){cliPos[r.codcli]=(cliPos[r.codcli]||0)+r.fat;});
  var qtdCliPos=Object.keys(cliPos).length;
  var tick=totPos>0?fatBru/totPos:0;

  var c='<div class="cards">';
  c+='<div class="card"><div class="lbl">Faturamento Bruto</div><div class="val" style="color:#34d399">'+fmt(fatBru)+'</div></div>';
  c+='<div class="card"><div class="lbl">Positiva\u00e7\u00e3o</div><div class="val" style="color:#34d399">'+qtdCliPos+'</div></div>';
  c+='<div class="card"><div class="lbl">Ticket M\u00e9dio</div><div class="val" style="color:#a78bfa">'+fmt(tick)+'</div></div>';
  c+='</div>';

  var vends={};
  // Faturamento + clientes fat = todos registros (inclui devoluções)
  filtered.forEach(function(r){
    if(!vends[r.codusur])vends[r.codusur]={codusur:r.codusur,rca:r.rca,regiao:(metas[r.codusur]||{}).regiao||'',pedidos:0,fat:0,clientes:{}};
    vends[r.codusur].fat+=r.fat;
    if(!vends[r.codusur].clientes[r.codcli])vends[r.codusur].clientes[r.codcli]={fat:0,pos:0};
    vends[r.codusur].clientes[r.codcli].fat+=r.fat;
  });
  // Positivação = só registros positivos
  pos.forEach(function(r){
    vends[r.codusur].pedidos++;
    vends[r.codusur].clientes[r.codcli].pos++;
  });

  var vArr=Object.keys(vends).map(function(k){return vends[k];}).sort(function(a,b){return a.rca.localeCompare(b.rca);});

  var m='<div class="chart-box"><h2>Matriz de Positiva\u00e7\u00e3o <span class="sub">'+viewName+' &mdash; Julho/2026 vs Meta</span></h2><table><thead><tr><th>Vendedor</th><th>Regi\u00e3o</th><th class="text-right">Meta FAT</th><th class="text-right">Faturamento</th><th>% FAT</th><th class="text-right">Meta Pos.</th><th class="text-right">Pos.</th><th>% Pos.</th><th class="text-right">Ticket</th></tr></thead><tbody>';
  var totFat=0,tMetaFat=0,totPos=0,tMetaPos=0;
  vArr.forEach(function(v,i){
    var qc=Object.keys(v.clientes).length;
    var tickV=qc>0?v.fat/qc:0;
    var mt=metas[v.codusur]||{};
    var pf=mt.fat>0?pct(v.fat,mt.fat):0;
    var pp=mt.pos>0?pct(qc,mt.pos):0;
    var fC=pf>=100?'#34d399':pf>=70?'#fbbf24':'#f87171';
    var pC=pp>=100?'#34d399':pp>=70?'#fbbf24':'#f87171';
    totFat+=v.fat;tMetaFat+=mt.fat||0;totPos+=qc;tMetaPos+=mt.pos||0;
    var faltaFat=(mt.fat||0)>v.fat?mt.fat-v.fat:((mt.fat||0)>0?0:null);
    var faltaPos=(mt.pos||0)>qc?mt.pos-qc:((mt.pos||0)>0?0:null);
    m+='<tr'+(i%2===0?' style="background:rgba(255,255,255,0.02)"':'')+'>'+
      '<td style="font-weight:600;color:#fcd34d">'+v.rca+'</td>'+
      '<td style="color:#888">'+v.regiao+'</td>'+
      '<td class="text-right" style="color:#888;white-space:nowrap">'+fmt(mt.fat||0)+'</td>'+
      '<td class="text-right" style="color:#fbbf24;font-weight:700;white-space:nowrap">'+fmt(v.fat)+'</td>'+
      '<td><div class="bar-bg"><div class="bar-fill" style="width:'+Math.min(pf,100).toFixed(0)+'%;background:'+fC+'"></div></div><span style="font-size:13px;color:'+fC+';font-weight:600">'+pf.toFixed(1)+'%</span>'+(faltaFat===null?'<div style="font-size:11px;color:#888;margin-top:2px">Sem meta</div>':faltaFat>0?'<div style="font-size:13px;color:#f87171;margin-top:2px">Falta '+fmt(faltaFat)+'</div>':'<div style="font-size:13px;color:#34d399;margin-top:2px">OK</div>')+'</td>'+
      '<td class="text-right" style="color:#888">'+(mt.pos||'&mdash;')+'</td>'+
      '<td class="text-right" style="color:#34d399;font-weight:600">'+qc+'</td>'+
      '<td><div class="bar-bg"><div class="bar-fill" style="width:'+Math.min(pp,100).toFixed(0)+'%;background:'+pC+'"></div></div><span style="font-size:13px;color:'+pC+';font-weight:600">'+pp.toFixed(1)+'%</span>'+(faltaPos===null?'<div style="font-size:11px;color:#888;margin-top:2px">Sem meta</div>':faltaPos>0?'<div style="font-size:13px;color:#f87171;margin-top:2px">Falta '+faltaPos+'</div>':'<div style="font-size:13px;color:#34d399;margin-top:2px">OK</div>')+'</td>'+
      '<td class="text-right" style="color:#a78bfa;white-space:nowrap">'+fmt(tickV)+'</td></tr>';
  });
  var tPf=tMetaFat>0?pct(totFat,tMetaFat):0;
  var tPp=tMetaPos>0?pct(totPos,tMetaPos):0;
  var tFc=tPf>=100?'#34d399':tPf>=70?'#fbbf24':'#f87171';
  var tPc=tPp>=100?'#34d399':tPp>=70?'#fbbf24':'#f87171';
  var tickTotal=totPos>0?totFat/totPos:0;
  var tFaltaFat=tMetaFat>totFat?tMetaFat-totFat:(tMetaFat>0?0:null);
  var tFaltaPos=tMetaPos>totPos?tMetaPos-totPos:(tMetaPos>0?0:null);
  m+='<tr style="background:#151830;border-top:2px solid #f59e0b">'+
    '<td style="font-weight:800;color:#fcd34d;font-size:16px">TOTAL</td>'+
    '<td style="color:#888"></td>'+
    '<td class="text-right" style="color:#fbbf24;font-weight:600;white-space:nowrap">'+fmt(tMetaFat)+'</td>'+
    '<td class="text-right" style="color:#fbbf24;font-weight:800;font-size:16px;white-space:nowrap">'+fmt(totFat)+'</td>'+
    '<td><div class="bar-bg"><div class="bar-fill" style="width:'+Math.min(tPf,100).toFixed(0)+'%;background:'+tFc+'"></div></div><span style="font-size:13px;color:'+tFc+';font-weight:700">'+tPf.toFixed(1)+'%</span>'+(tFaltaFat===null?'<div style="font-size:11px;color:#888;margin-top:2px">Sem meta</div>':tFaltaFat>0?'<div style="font-size:13px;color:#f87171;margin-top:2px">Falta '+fmt(tFaltaFat)+'</div>':'<div style="font-size:13px;color:#34d399;margin-top:2px">OK</div>')+'</td>'+
    '<td class="text-right" style="color:#34d399;font-weight:600">'+tMetaPos+'</td>'+
    '<td class="text-right" style="color:#34d399;font-weight:800;font-size:16px">'+totPos+'</td>'+
    '<td><div class="bar-bg"><div class="bar-fill" style="width:'+Math.min(tPp,100).toFixed(0)+'%;background:'+tPc+'"></div></div><span style="font-size:13px;color:'+tPc+';font-weight:700">'+tPp.toFixed(1)+'%</span>'+(tFaltaPos===null?'<div style="font-size:11px;color:#888;margin-top:2px">Sem meta</div>':tFaltaPos>0?'<div style="font-size:13px;color:#f87171;margin-top:2px">Falta '+tFaltaPos+'</div>':'<div style="font-size:13px;color:#34d399;margin-top:2px">OK</div>')+'</td>'+
    '<td class="text-right" style="color:#a78bfa;font-weight:700;white-space:nowrap">'+fmt(tickTotal)+'</td></tr>';
  m+='</tbody></table></div>';

  // Departamento section
  var dept={};
  filtered.forEach(function(r){
    var d=r.depto||'SEM DEPARTAMENTO';
    if(!dept[d])dept[d]={fat:0,pos:0,cli:{}};
    dept[d].fat+=r.fat;
  });
  pos.forEach(function(r){
    var d=r.depto||'SEM DEPARTAMENTO';
    dept[d].pos++;
    dept[d].cli[r.codcli]=1;
  });
  var dArr=Object.keys(dept).map(function(k){return{k:k,fat:dept[k].fat,pos:dept[k].pos,cli:Object.keys(dept[k].cli).length};}).sort(function(a,b){return b.fat-a.fat;});
  var dTotFat=dArr.reduce(function(s,d){return s+d.fat;},0);
  var dep='<div class="chart-box"><h2>Faturamento por Departamento <span class="sub">'+viewName+' &mdash; Julho/2026</span></h2><table><thead><tr><th>Departamento</th><th class="text-right">Faturamento</th><th class="text-right">%</th></tr></thead><tbody>';
  dArr.forEach(function(d,i){
    var dp=dTotFat>0?d.fat/dTotFat*100:0;
    dep+='<tr'+(i%2===0?' style="background:rgba(255,255,255,0.02)"':'')+'>'+
      '<td style="font-weight:600;color:#fcd34d">'+d.k+'</td>'+
      '<td class="text-right" style="color:#fbbf24;font-weight:700">'+fmt(d.fat)+'</td>'+
      '<td class="text-right" style="color:#888;font-size:13px">'+dp.toFixed(1)+'%</td></tr>';
  });
  dep+='<tr style="background:#151830;border-top:2px solid #f59e0b">'+
    '<td style="font-weight:800;color:#fcd34d;font-size:16px">TOTAL</td>'+
    '<td class="text-right" style="color:#fbbf24;font-weight:800;font-size:16px">'+fmt(dTotFat)+'</td>'+
    '<td class="text-right" style="color:#fbbf24;font-weight:600;font-size:14px">100%</td></tr>';
  dep+='</tbody></table></div>';

  var d='<h2 style="font-size:18px;font-weight:700;color:#fcd34d;text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px">Detalhamento por Vendedor</h2>';
  vArr.forEach(function(v){
    var clis=Object.keys(v.clientes).map(function(cod){
      var nome='';
      for(var ri=0;ri<pos.length;ri++){
        if(String(pos[ri].codcli)===cod&&String(pos[ri].codusur)===v.codusur){nome=pos[ri].cliente;break;}
      }
      return{cod:cod,nome:nome,fat:v.clientes[cod].fat,pos:v.clientes[cod].pos};
    }).sort(function(a,b){return b.fat-a.fat;});

    d+='<div class="chart-box">';
    d+='<div style="font-weight:700;color:#fcd34d;font-size:18px;margin-bottom:10px">'+v.rca+'</div>';
    d+='<div style="margin-bottom:8px"><input type="text" placeholder="Filtrar por CODCLI..." onkeyup="var f=this.value.toUpperCase(),t=this.parentNode.nextElementSibling;if(t&&t.tagName!==\'TABLE\')t=t.querySelector(\'table\');if(t){var r=t.querySelectorAll(\'tbody tr\');for(var i=0;i<r.length;i++)r[i].style.display=f&&(r[i].cells[2]?r[i].cells[2].textContent.toUpperCase():\'\').indexOf(f)===-1?\'none\':\'\';}" style="padding:6px 10px;border:1px solid #333;border-radius:4px;background:#111;color:#eee;font-size:14px;width:220px"></div>';
    d+='<div class="tw" style="max-height:380px"><table><thead><tr><th style="text-align:center">#</th><th>CODCLI</th><th>Cliente</th><th class="text-right">Faturamento</th></tr></thead><tbody>';
    clis.forEach(function(c,i){
      d+='<tr><td style="text-align:center;color:#888">'+(i+1)+'</td><td style="color:#60a5fa">'+c.cod+'</td><td class="cell-cli">'+c.nome+'</td><td class="text-right" style="color:#fbbf24;font-weight:600">'+fmt(c.fat)+'</td></tr>';
    });
    var totCliFat=clis.reduce(function(s,c){return s+c.fat;},0);
    d+='</tbody></table></div>'+
      '<div style="display:flex;justify-content:space-between;padding:8px 12px;background:#151830;border-top:2px solid #f59e0b;border-radius:0 0 6px 6px">'+
      '<span style="font-weight:700;color:#fcd34d">TOTAL</span>'+
      '<span style="color:#fbbf24;font-weight:800;font-size:16px">'+fmt(totCliFat)+'</span></div></div>';
  });

  document.getElementById('app').innerHTML=c+m+(viewName==='Geral'?dep:'')+d;
}

function fmtMes(m){
  return ['','Janeiro','Fevereiro','Mar\u00e7o','Abril','Maio','Junho','Julho'][m];
}

function renderRegiaoMes(){
  if(!DADOS_MES||!REGIAO_MES){
    document.getElementById('app').innerHTML='<div style="padding:40px;text-align:center;color:#666">Dados mensais não carregados.</div>';
    return;
  }

  var months=['Jan','Fev','Mar','Abr','Mai','Jun','Jul'];
  var fullMonths=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho'];
  var order=['Região Metropolitana','Região Sul','Serra','Litoral','Vale dos Sinos'];
  var cores=['#f59e0b','#34d399','#60a5fa','#a78bfa','#f87171'];

  function calcReg(reg){
    var rd=REGIAO_MES[reg];
    if(!rd)return null;
    var out={months:[],totalFat:0,totalPos:0,totalCli:0};
    for(var m=1;m<=7;m++){
      var fat=0,pos=0,cli=0;
      (rd[m]||[]).forEach(function(c){
        var d=DADOS_MES[m][c];
        if(d){fat+=d.fat;pos+=d.pos;cli+=d.cli;}
      });
      out.months.push({fat:fat,pos:pos,cli:cli});
      out.totalFat+=fat;out.totalPos+=pos;out.totalCli+=cli;
    }
    return out;
  }

  var regData={};
  order.forEach(function(reg,ri){regData[reg]=calcReg(reg);regData[reg].cor=cores[ri];});
  var oldJun={}; // June 2025 FAT per region (from Análise Televendas.xlsx - OFICIAL)
  oldJun['Grande Poa']=250183.91; oldJun['Vale Sinos']=122890.02;
  oldJun['Serra']=100150.32; oldJun['Litoral']=44283.31;

  var gFat=0,gPed=0;
  order.forEach(function(reg){gFat+=regData[reg].totalFat;gPed+=regData[reg].totalPos;});
  var gTick=gPed>0?gFat/gPed:0;

  var mFat=[0,0,0,0,0,0,0];
  var mPos=[0,0,0,0,0,0,0];
  var mPed=[0,0,0,0,0,0,0];
  order.forEach(function(reg){
    for(var i=0;i<7;i++){
      mFat[i]+=regData[reg].months[i].fat;
      mPos[i]+=regData[reg].months[i].cli;
      mPed[i]+=regData[reg].months[i].pos;
    }
  });

  var maxFV=Math.max.apply(null,mFat);if(maxFV===0)maxFV=1;
  var maxPV=Math.max.apply(null,mPos);if(maxPV===0)maxPV=1;

  function svgLine(vals,color,vals25){
    var all=vals.slice();if(vals25)all=all.concat(vals25);
    var max=Math.max.apply(null,all);if(max===0)max=1;
    var min=0;
    var range=max-min||1;
    var W=840,H=280,PL=60,PR=40,PT=30,PB=40;
    var cw=W-PL-PR,ch=H-PT-PB;
    function yPos(v){return PT+ch-((v-min)/range)*ch;}
    function xPos(i){return PL+i/(6)*cw;}
    function fVal(v){return color==='#f59e0b'?fmt(v):String(v);}

    // Collect all label descriptors with initial positions
    var L=[];
    function addL(i,v,ser){
      if(v==null)return;
      var x=xPos(i), y=yPos(v), t=fVal(v);
      L.push({x:x, ay:y, t:t, w:t.length*6.5, h:14,
        adjY: ser===0? y-20 : y+22, ser:ser, m:i});
    }
    for(var i=0;i<7;i++)addL(i,vals[i],0);
    if(vals25)for(var i=0;i<7;i++)addL(i,vals25[i],1);

    // Resolve collisions: iterative push-apart
    for(var it=0;it<30;it++){
      var hit=false;
      for(var i=0;i<L.length;i++)for(var j=i+1;j<L.length;j++){
        var a=L[i],b=L[j];
        if(Math.abs(a.x-b.x)>=(a.w+b.w)/2+6)continue;
        if(Math.abs(a.adjY-b.adjY)>=20)continue;
        if(a.adjY<=b.adjY){a.adjY-=3;b.adjY+=3;}
        else{b.adjY-=3;a.adjY+=3;}
        hit=true;
      }
      for(var i=0;i<L.length;i++){
        if(L[i].adjY<18)L[i].adjY=18;
        if(L[i].adjY>H-10)L[i].adjY=H-10;
      }
      if(!hit)break;
    }

    var s='<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;height:auto"><rect width="'+W+'" height="'+H+'" fill="none"/>';
    // Grid
    for(var g=0;g<=4;g++){
      var gy=PT+(g/4)*ch;
      var gv=Math.round(max-(g/4)*range);
      s+='<line x1="'+PL+'" y1="'+gy+'" x2="'+(W-PR)+'" y2="'+gy+'" stroke="#1e1b4b" stroke-width="1"/>'+
        (!vals25?'<text x="'+(PL-5)+'" y="'+(gy+4)+'" fill="#6b7280" font-size="11" text-anchor="end">'+fVal(gv)+'</text>':'');
    }
    // 2025 line + dots
    if(vals25){
      var p25=[];for(var i=0;i<7;i++)p25.push(xPos(i)+','+yPos(vals25[i]));
      s+='<polyline points="'+p25.join(' ')+'" fill="none" stroke="#6b7280" stroke-width="1.5" stroke-dasharray="5,3" stroke-linejoin="round" stroke-linecap="round"/>';
      for(var i=0;i<7;i++)s+='<circle cx="'+xPos(i)+'" cy="'+yPos(vals25[i])+'" r="3" fill="#6b7280" stroke="#111" stroke-width="1.5"/>';
    }
    // 2026 line + dots
    var p=[];for(var i=0;i<7;i++)p.push(xPos(i)+','+yPos(vals[i]));
    s+='<polyline points="'+p.join(' ')+'" fill="none" stroke="'+color+'" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>';
    s+='<polyline points="'+p.join(' ')+'" fill="none" stroke="'+color+'" stroke-width="6" stroke-linejoin="round" stroke-linecap="round" opacity="0.15"/>';
    for(var i=0;i<7;i++)s+='<circle cx="'+xPos(i)+'" cy="'+yPos(vals[i])+'" r="4.5" fill="'+color+'" stroke="#111" stroke-width="2"/>';
    // Leader lines for labels pushed >20px
    for(var i=0;i<L.length;i++){
      var d=Math.abs(L[i].adjY-L[i].ay);
      if(d>16){
        var ly=L[i].adjY+(L[i].adjY>L[i].ay?-4:4);
        s+='<line x1="'+L[i].x+'" y1="'+L[i].ay+'" x2="'+L[i].x+'" y2="'+ly+'" stroke="#6b7280" stroke-width="0.8" stroke-dasharray="2,2"/>';
      }
    }
    // Labels
    for(var i=0;i<L.length;i++){
      var l=L[i];
      s+='<text x="'+l.x+'" y="'+l.adjY+'" fill="'+(l.ser===1?'#9ca3af':'#f3f4f6')+'" font-size="'+(l.ser===1?'12':'13')+'" text-anchor="middle" font-weight="'+(l.ser===1?'400':'600')+'">'+l.t+'</text>';
    }
    // Month labels
    for(var i=0;i<7;i++)s+='<text x="'+xPos(i)+'" y="'+(H-8)+'" fill="#9ca3af" font-size="13" text-anchor="middle">'+months[i]+'</text>';
    // Legend
    if(vals25){
      s+='<circle cx="'+(W-120)+'" cy="16" r="3" fill="'+color+'" stroke="none"/><text x="'+(W-112)+'" y="20" fill="#eee" font-size="12">2026</text>'+
        '<line x1="'+(W-80)+'" y1="16" x2="'+(W-62)+'" y2="16" stroke="#6b7280" stroke-width="1.5" stroke-dasharray="3,2"/><text x="'+(W-55)+'" y="20" fill="#9ca3af" font-size="12">2025</text>';
    }
    s+='</svg>';
    return s;
  }

  var html='<div class="cards">';
  html+='<div class="card"><div class="lbl">Faturamento Jan-Jul</div><div class="val" style="color:#fbbf24">'+fmt(gFat)+'</div></div>';
  html+='<div class="card"><div class="lbl">Total Clientes</div><div class="val" style="color:#34d399">'+(DADOS_MES.activeCli||'-')+'</div></div>';
  html+='<div class="card"><div class="lbl">Total Pedidos</div><div class="val" style="color:#60a5fa">'+gPed.toLocaleString('pt-BR')+'</div></div>';
  html+='</div>';


  html+='<div class="chart-box" style="margin-bottom:14px"><div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">'+

    '<span style="font-weight:700;color:#fcd34d;font-size:18px">Evolução Faturamento <span style="font-size:14px;color:#6b7280;font-weight:400">2026 vs 2025</span></span></div><div style="max-width:1200px;margin:0 auto">'+svgLine(mFat,'#f59e0b',DADOS_2025.fat)+'</div></div>';

  html+='<div class="chart-box" style="margin-bottom:14px"><div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">'+
    '<span style="font-weight:700;color:#fcd34d;font-size:18px">Evolução Positivações <span style="font-size:14px;color:#6b7280;font-weight:400">2026 vs 2025</span></span></div><div style="max-width:1200px;margin:0 auto">'+svgLine(mPos,'#34d399',DADOS_2025.pos)+'</div></div>';

  // Variação mensal (tabela compacta)
  html+='<div class="chart-box" style="margin-bottom:14px">';
  html+='<div style="font-weight:700;color:#fcd34d;font-size:18px;margin-bottom:8px">Variação Mês a Mês</div>';
   html+='<div style="overflow-x:auto"><table><thead><tr><th>M\u00eas</th><th class="text-right">Faturamento</th><th class="text-right">Var. FAT</th></tr></thead><tbody>';
  for(var i=0;i<7;i++){
    var pVar=i>0?((mFat[i]-mFat[i-1])/mFat[i-1]*100):0;
    html+='<tr>'+
      '<td style="font-weight:600;color:#fcd34d">'+fullMonths[i]+'</td>'+
      '<td class="text-right" style="color:#fbbf24">'+fmt(mFat[i])+'</td>'+
      '<td class="text-right" style="color:'+(pVar>=0?'#34d399':'#f87171')+'">'+(i>0?(pVar>=0?'+':'')+pVar.toFixed(1)+'%':'-')+'</td></tr>';
  }
  html+='</tbody></table></div></div>';
  html+='</tbody></table></div></div>';

  // Regiões em cards compactos
  html+='<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:12px;margin-bottom:10px">';
  order.forEach(function(reg,ri){
    var rd=regData[reg];
    var bf=-1,bi=0;
    for(var i=0;i<7;i++){
      if(rd.months[i].fat>bf){bf=rd.months[i].fat;bi=i;}
    }
    var jun26=rd.months[5].fat;
    var jun25=oldJun[reg];
    var cmp=jun25?((jun26>=jun25?'▲':'▼')+' R$ '+fmt(Math.abs(jun26-jun25))):'N/A';
    html+='<div class="chart-box" style="margin-bottom:0;border-left:3px solid '+rd.cor+';padding:12px 16px">'+
      '<div style="display:flex;align-items:center;gap:6px;margin-bottom:2px">'+
      '<span style="width:10px;height:10px;border-radius:50%;background:'+rd.cor+';display:inline-block"></span>'+
      '<span style="font-weight:600;color:#fcd34d;font-size:16px">'+reg+'</span></div>'+
      '<div style="font-size:15px"><span style="color:#fbbf24;font-weight:700">'+fmt(rd.totalFat)+'</span></div>'+
      '<div style="font-size:13px;color:#6b7280;margin-top:2px">Pico: '+fullMonths[bi]+' ('+fmt(bf)+')'+
      ' &middot; Jun/25: <span style="color:'+(jun25?(jun26>=jun25?'#34d399':'#f87171'):'#6b7280')+'">'+cmp+'</span></div></div>';
  });
  html+='</div>';

  document.getElementById('app').innerHTML=html;
}
</script>
<script src="dados_julho.js"></script>
<script src="dados_mensal.js"></script>
<script>render();</script>
</body>
</html>
